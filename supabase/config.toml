# subscribe-push is called from the client with a user JWT — keep the
# default verify_jwt = true so RLS protects the upsert.
#
# notify-on-live-game-start is invoked by AFTER INSERT triggers via pg_net,
# not by a user session. We turn verify_jwt off and instead require a
# shared CRON_SECRET in the X-Cron-Secret header (both the function and
# the trigger read it from Supabase secrets / Postgres vault). Anything
# without the matching secret is rejected before touching the DB.
[functions.notify-on-live-game-start]
verify_jwt = false
