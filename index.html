    <title>My Score Tracker</title>

    <meta property="og:title" content="My Score Tracker" />
    <meta property="og:description" content="Ready to track your game scores?" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pajcho.github.io/my-score-tracker/" />
    <meta property="og:image" content="https://cdn-icons-png.freepik.com/512/5148/5148732.png" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="https://pajcho.github.io/my-score-tracker/" />
    <meta name="twitter:image" content="https://cdn-icons-png.freepik.com/512/5148/5148732.png" />

    <script>
      // Apply persisted theme synchronously, before React mounts, so the
      // initial paint isn't a brief flash of the wrong theme (FOUC). Also
      // flips the active <meta name="theme-color"> for the iOS status bar
      // so it matches the chosen theme even when the OS preference disagrees.
      (function () {
        const storageKey = 'score-tracker-theme';
        const rootElement = document.documentElement;
        const savedTheme = localStorage.getItem(storageKey);
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const resolvedTheme = savedTheme === 'light' || savedTheme === 'dark'
          ? savedTheme
          : prefersDarkScheme
            ? 'dark'
            : 'light';
        const isDark = resolvedTheme === 'dark';

        if (isDark) {
          rootElement.classList.add('dark');
          rootElement.style.backgroundColor = 'hsl(218 24% 9%)';
        } else {
          rootElement.classList.remove('dark');
          rootElement.style.backgroundColor = 'hsl(210 20% 98%)';
        }

        // Drop the media-scoped theme-color tags and add a single one
        // matching the resolved theme. iOS only honours the first
        // unconditional theme-color, and dynamically updating it on
        // theme toggle becomes a one-line setAttribute.
        try {
          const head = document.head;
          const tags = head.querySelectorAll('meta[name="theme-color"]');
          for (let i = 0; i < tags.length; i++) head.removeChild(tags[i]);
          const meta = document.createElement('meta');
          meta.setAttribute('name', 'theme-color');
          meta.setAttribute('content', isDark ? '#11161E' : '#1B5AA7');
          head.appendChild(meta);
        } catch (_) {}
      })();
    </script>
  </head>
